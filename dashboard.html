<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RAG Server - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body class="dash-page">
    <nav class="navbar">
        <div class="nav-content">
            <span class="logo-nav">ROBLOX</span>
            <input type="text" placeholder="Pesquisar">
        </div>
    </nav>

    <div class="main-content">
        <div class="game-header">
            <div class="game-thumb">R</div>
            <div class="game-info">
                <h1>RAG Exemplo Server</h1>
                <p>Por <span>@AdminRAG</span></p>
                <div class="stats">👍 98% | 👥 1.2k+</div>
            </div>
            <button class="play-button">▶</button>
        </div>

        <div class="details">
            <h2>Sobre o Servidor</h2>
            <p>O servidor RAG funciona através de uma arquitetura de dados distribuída. Quando você loga, o sistema valida suas credenciais e carrega seu inventário via API.</p>
        </div>
    </div>
</body>
</html>
